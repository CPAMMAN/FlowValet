<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlowValet — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --black: #0a0a0a;
  --white: #f5f5f0;
  --gold: #c9a84c;
  --gold-light: #e8c97a;
  --surface: #141414;
  --surface2: #1e1e1e;
  --border: rgba(201,168,76,0.2);
  --green: #4ade80;
  --orange: #fb923c;
  --red: #f87171;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:var(--black); color:var(--white);
  font-family:'DM Sans',sans-serif; min-height:100vh;
}
body::before {
  content:''; position:fixed; inset:0;
  background:radial-gradient(ellipse 100% 40% at 50% 0%, rgba(201,168,76,0.08) 0%, transparent 60%);
  pointer-events:none; z-index:0;
}

/* Login overlay */
.login-overlay {
  position:fixed; inset:0; background:var(--black); z-index:100;
  display:flex; align-items:center; justify-content:center; padding:20px;
}
.login-box {
  background:var(--surface); border:1px solid var(--border); border-radius:20px;
  padding:40px 36px; width:100%; max-width:360px; text-align:center;
}
.login-logo { font-family:'Syne',sans-serif; font-weight:800; font-size:26px; margin-bottom:6px; }
.login-logo span { color:var(--gold); }
.login-sub { font-size:13px; color:rgba(255,255,255,0.4); margin-bottom:28px; }
.login-input {
  width:100%; background:var(--surface2); border:1px solid rgba(255,255,255,0.08);
  border-radius:10px; padding:14px 16px; font-size:16px; color:var(--white);
  font-family:'DM Sans',sans-serif; outline:none; margin-bottom:14px;
  transition:border-color 0.2s; text-align:center; letter-spacing:4px;
}
.login-input:focus { border-color:var(--gold); }
.login-btn {
  width:100%; padding:14px; background:var(--gold); color:var(--black);
  border:none; border-radius:10px; font-family:'Syne',sans-serif;
  font-size:15px; font-weight:700; cursor:pointer; transition:all 0.2s;
}
.login-btn:hover { background:var(--gold-light); }
.login-err { font-size:13px; color:var(--red); margin-top:10px; display:none; }

/* Main layout */
.page { position:relative; z-index:1; display:flex; flex-direction:column; min-height:100vh; }

header {
  display:flex; justify-content:space-between; align-items:center;
  padding:16px 24px; border-bottom:1px solid var(--border);
  position:sticky; top:0; background:rgba(10,10,10,0.95);
  backdrop-filter:blur(10px); z-index:50;
}
.logo { font-family:'Syne',sans-serif; font-weight:800; font-size:20px; }
.logo span { color:var(--gold); }
.header-right { display:flex; align-items:center; gap:12px; }
.live-dot {
  display:flex; align-items:center; gap:6px;
  font-size:12px; color:var(--green); font-weight:600;
}
.live-dot::before {
  content:''; width:8px; height:8px; background:var(--green);
  border-radius:50%; animation:pulse 1.5s ease infinite;
}
@keyframes pulse {
  0%,100% { opacity:1; } 50% { opacity:0.3; }
}
.header-btn {
  padding:7px 16px; border-radius:8px; font-size:13px; font-weight:600;
  cursor:pointer; border:1px solid var(--border); background:transparent;
  color:var(--white); font-family:'DM Sans',sans-serif; transition:all 0.2s;
  text-decoration:none; display:inline-block;
}
.header-btn:hover { background:var(--surface2); border-color:var(--gold); }

/* Stats bar */
.stats-bar {
  display:flex; gap:12px; padding:16px 24px;
  border-bottom:1px solid rgba(255,255,255,0.05); overflow-x:auto;
}
.stat {
  background:var(--surface); border:1px solid var(--border); border-radius:12px;
  padding:14px 20px; min-width:120px; flex-shrink:0;
}
.stat-num { font-family:'Syne',sans-serif; font-size:28px; font-weight:800; color:var(--white); }
.stat-num.gold { color:var(--gold); }
.stat-num.orange { color:var(--orange); }
.stat-num.green { color:var(--green); }
.stat-label { font-size:11px; color:rgba(255,255,255,0.4); text-transform:uppercase; letter-spacing:0.8px; margin-top:2px; }

/* Cards area */
.content { padding:20px 24px; flex:1; }
.section-title {
  font-family:'Syne',sans-serif; font-size:13px; font-weight:700;
  text-transform:uppercase; letter-spacing:1.5px;
  margin-bottom:14px; display:flex; align-items:center; gap:8px;
}
.badge {
  background:var(--orange); color:#000; font-size:11px; font-weight:700;
  padding:2px 8px; border-radius:100px;
}
.badge.green { background:var(--green); }

.cards-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px,1fr)); gap:14px; margin-bottom:28px; }

/* Vehicle card */
.v-card {
  background:var(--surface); border:1px solid rgba(255,255,255,0.07);
  border-radius:16px; padding:20px; transition:all 0.3s; position:relative;
  overflow:hidden;
}
.v-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; }
.v-card.parked::before { background:rgba(255,255,255,0.1); }
.v-card.notified {
  border-color:rgba(251,146,60,0.4);
  background:linear-gradient(135deg, rgba(251,146,60,0.06) 0%, var(--surface) 60%);
  animation:alertPulse 2s ease infinite;
}
.v-card.notified::before { background:var(--orange); }
.v-card.retrieving { border-color:rgba(201,168,76,0.4); }
.v-card.retrieving::before { background:var(--gold); }

@keyframes alertPulse {
  0%,100% { box-shadow:0 0 0 0 rgba(251,146,60,0); }
  50% { box-shadow:0 0 0 6px rgba(251,146,60,0.12); }
}

.card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px; }
.card-plate { font-family:'Syne',sans-serif; font-size:22px; font-weight:800; letter-spacing:3px; }
.card-status {
  font-size:11px; font-weight:700; letter-spacing:0.8px;
  text-transform:uppercase; padding:4px 10px; border-radius:100px;
}
.status-parked { background:rgba(255,255,255,0.06); color:rgba(255,255,255,0.4); }
.status-notified { background:rgba(251,146,60,0.15); color:var(--orange); }
.status-retrieving { background:rgba(201,168,76,0.15); color:var(--gold); }
.status-done { background:rgba(74,222,128,0.12); color:var(--green); }

.card-info { display:flex; gap:20px; margin-bottom:16px; }
.card-field {}
.card-field-label { font-size:10px; color:rgba(255,255,255,0.35); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:2px; }
.card-field-val { font-family:'Syne',sans-serif; font-size:16px; font-weight:700; color:var(--white); }

/* Countdown in card */
.card-countdown {
  background:rgba(251,146,60,0.1); border:1px solid rgba(251,146,60,0.2);
  border-radius:10px; padding:10px 14px; margin-bottom:14px;
  display:flex; align-items:center; gap:10px;
}
.countdown-icon { font-size:20px; }
.countdown-val { font-family:'Syne',sans-serif; font-size:22px; font-weight:800; color:var(--orange); }
.countdown-txt { font-size:12px; color:rgba(255,255,255,0.4); }

.card-actions { display:flex; gap:8px; }
.card-btn {
  flex:1; padding:9px 10px; border-radius:8px; font-size:12px; font-weight:600;
  cursor:pointer; border:none; transition:all 0.2s; font-family:'DM Sans',sans-serif;
}
.btn-retrieve { background:var(--gold); color:var(--black); }
.btn-retrieve:hover { background:var(--gold-light); }
.btn-done { background:rgba(74,222,128,0.15); color:var(--green); border:1px solid rgba(74,222,128,0.2); }
.btn-done:hover { background:rgba(74,222,128,0.25); }
.btn-remove { background:rgba(255,255,255,0.05); color:rgba(255,255,255,0.4); border:1px solid rgba(255,255,255,0.08); }
.btn-remove:hover { background:rgba(241,87,87,0.1); color:var(--red); border-color:rgba(241,87,87,0.2); }

/* Empty state */
.empty { text-align:center; padding:60px 20px; color:rgba(255,255,255,0.25); }
.empty-icon { font-size:48px; margin-bottom:12px; }
.empty p { font-size:14px; }

/* Alert sound indicator */
.alert-banner {
  position:fixed; top:70px; left:50%; transform:translateX(-50%) translateY(-100px);
  background:#fb923c; color:#000; padding:12px 28px; border-radius:100px;
  font-family:'Syne',sans-serif; font-weight:700; font-size:14px;
  z-index:200; transition:transform 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
  white-space:nowrap; box-shadow:0 8px 32px rgba(251,146,60,0.4);
}
.alert-banner.show { transform:translateX(-50%) translateY(0); }
</style>

      <button class="header-btn" onclick="doLogout()">Logout</button>
    </div>
  </header>

  <div class="stats-bar">
    <div class="stat">
      <div class="stat-num gold" id="statTotal">0</div>
      <div class="stat-label">Total Active</div>
    </div>
    <div class="stat">
      <div class="stat-num orange" id="statNotified">0</div>
      <div class="stat-label">Requesting Car</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="statParked">0</div>
      <div class="stat-label">Parked</div>
    </div>
    <div class="stat">
      <div class="stat-num green" id="statDone">0</div>
      <div class="stat-label">Completed Today</div>
    </div>
  </div>

  <div class="content">
    <!-- Alerts -->
    <div id="alertsSection" style="display:none;">
      <div class="section-title">
        🚨 Requesting Vehicle
        <span class="badge" id="alertBadge">0</span>
      </div>
      <div class="cards-grid" id="alertCards"></div>
    </div>

    <!-- All parked -->
    <div>
      <div class="section-title">
        🚗 All Active Vehicles
        <span class="badge green" id="allBadge">0</span>
      </div>
      <div class="cards-grid" id="allCards">
        <div class="empty"><div class="empty-icon">🏁</div><p>No active vehicles.<br>Check in a vehicle to get started.</p></div>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC0IXfYNIbEjbLiPiY8C2C_JPAd5baTLMo",
  authDomain: "flowvalet-efd95.firebaseapp.com",
  databaseURL: "https://flowvalet-efd95-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "flowvalet-efd95",
  storageBucket: "flowvalet-efd95.firebasestorage.app",
  messagingSenderId: "394962828421",
  appId: "1:394962828421:web:7bab162c88f3da9ee13dec"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

var knownNotified = new Set();
var allTickets = {};

window.__markRetrieving = function(id) {
  update(ref(db, 'tickets/' + id), { status: 'retrieving' });
};
window.__markDone = function(id) {
  // Archive and remove
  var t = allTickets[id];
  if (t) {
    var doneRef = ref(db, 'done/' + id);
    update(doneRef, Object.assign({}, t, { status: 'done', doneAt: new Date().toISOString() }))
      .then(function(){ remove(ref(db, 'tickets/' + id)); });
  }
};
window.__removeTicket = function(id) {
  if (confirm('Remove this vehicle from the list?')) {
    remove(ref(db, 'tickets/' + id));
  }
};

// Listen to active tickets
onValue(ref(db, 'tickets'), function(snap) {
  allTickets = {};
  if (snap.exists()) {
    snap.forEach(function(child) {
      allTickets[child.key] = child.val();
    });
  }
  renderDashboard(allTickets);
});

// Listen to done count
onValue(ref(db, 'done'), function(snap) {
  var count = 0;
  var today = new Date().toDateString();
  if (snap.exists()) {
    snap.forEach(function(child) {
      var d = child.val();
      if (d.doneAt && new Date(d.doneAt).toDateString() === today) count++;
    });
  }
  document.getElementById('statDone').textContent = count;
});

function renderDashboard(tickets) {
  var ids = Object.keys(tickets);
  var notifiedList = ids.filter(function(id){ return tickets[id].status === 'notified' || tickets[id].status === 'retrieving'; });
  var parkedList = ids.filter(function(id){ return tickets[id].status === 'parked'; });

  // Stats
  document.getElementById('statTotal').textContent = ids.length;
  document.getElementById('statNotified').textContent = notifiedList.length;
  document.getElementById('statParked').textContent = parkedList.length;
  document.getElementById('alertBadge').textContent = notifiedList.length;
  document.getElementById('allBadge').textContent = ids.length;

  // Alert section
  var alertsSection = document.getElementById('alertsSection');
  alertsSection.style.display = notifiedList.length > 0 ? 'block' : 'none';

  // New notifications
  notifiedList.forEach(function(id) {
    if (!knownNotified.has(id)) {
      knownNotified.add(id);
      showAlert(tickets[id].plate);
      playAlert();
    }
  });
  // Clean up resolved
  Array.from(knownNotified).forEach(function(id) {
    if (!tickets[id] || (tickets[id].status !== 'notified' && tickets[id].status !== 'retrieving')) {
      knownNotified.delete(id);
    }
  });

  // Render alert cards
  document.getElementById('alertCards').innerHTML = notifiedList.length === 0
    ? '' : notifiedList.map(function(id){ return buildCard(id, tickets[id], true); }).join('');

  // Render all cards
  var allContainer = document.getElementById('allCards');
  if (ids.length === 0) {
    allContainer.innerHTML = '<div class="empty"><div class="empty-icon">🏁</div><p>No active vehicles.<br>Check in a vehicle to get started.</p></div>';
  } else {
    allContainer.innerHTML = ids
      .sort(function(a,b){ return (tickets[b].notifiedAt||tickets[b].checkinTime) > (tickets[a].notifiedAt||tickets[a].checkinTime) ? 1 : -1; })
      .map(function(id){ return buildCard(id, tickets[id], false); }).join('');
  }

  // Start countdowns
  document.querySelectorAll('[data-countdown]').forEach(function(el) {
    var endTime = new Date(el.getAttribute('data-countdown'));
    tickCountdown(el, endTime);
  });
}

function buildCard(id, t, isAlert) {
  var status = t.status;
  var checkin = new Date(t.checkinTime);
  var checkinStr = checkin.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});

  var statusLabel = status === 'parked' ? 'Parked'
    : status === 'notified' ? '⚡ Requesting'
    : status === 'retrieving' ? '🔑 Retrieving'
    : 'Done';
  var statusClass = 'status-' + status;

  var countdownHtml = '';
  if ((status === 'notified' || status === 'retrieving') && t.notifiedAt && t.notifyMinutes) {
    var endTime = new Date(new Date(t.notifiedAt).getTime() + t.notifyMinutes * 60000);
    countdownHtml = '<div class="card-countdown">' +
      '<div class="countdown-icon">⏱️</div>' +
      '<div><div class="countdown-val" data-countdown="' + endTime.toISOString() + '">--:--</div>' +
      '<div class="countdown-txt">customer arrives in</div></div>' +
      '</div>';
  }

  var actions = '';
  if (status === 'notified') {
    actions = '<button class="card-btn btn-retrieve" onclick="window.__markRetrieving(\'' + id + '\')">🔑 Retrieving</button>' +
              '<button class="card-btn btn-done" onclick="window.__markDone(\'' + id + '\')">✅ Done</button>';
  } else if (status === 'retrieving') {
    actions = '<button class="card-btn btn-done" onclick="window.__markDone(\'' + id + '\')">✅ Car Delivered</button>';
  } else {
    actions = '<button class="card-btn btn-remove" onclick="window.__removeTicket(\'' + id + '\')">Remove</button>';
  }

  return '<div class="v-card ' + status + '">' +
    '<div class="card-top">' +
      '<div class="card-plate">' + t.plate + '</div>' +
      '<div class="card-status ' + statusClass + '">' + statusLabel + '</div>' +
    '</div>' +
    '<div class="card-info">' +
      '<div class="card-field"><div class="card-field-label">Spot</div><div class="card-field-val">' + t.spot + '</div></div>' +
      '<div class="card-field"><div class="card-field-label">Checked In</div><div class="card-field-val" style="font-size:14px;">' + checkinStr + '</div></div>' +
      (t.notifyMinutes ? '<div class="card-field"><div class="card-field-label">Requested</div><div class="card-field-val" style="font-size:14px;">' + t.notifyMinutes + ' min</div></div>' : '') +
    '</div>' +
    countdownHtml +
    '<div class="card-actions">' + actions + '</div>' +
  '</div>';
}

function tickCountdown(el, endTime) {
  function update() {
    var rem = Math.max(0, endTime - new Date());
    var m = Math.floor(rem / 60000);
    var s = Math.floor((rem % 60000) / 1000);
    el.textContent = m + ':' + String(s).padStart(2,'0');
    if (rem > 0) setTimeout(update, 1000);
    else el.textContent = 'NOW!';
  }
  update();
}

function showAlert(plate) {
  var banner = document.getElementById('alertBanner');
  banner.textContent = '🚨 ' + plate + ' is leaving soon!';
  banner.classList.add('show');
  setTimeout(function(){ banner.classList.remove('show'); }, 5000);
}

function playAlert() {
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0, 0.2, 0.4].forEach(function(delay) {
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = 880;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0, ctx.currentTime + delay);
      gain.gain.linearRampToValueAtTime(0.4, ctx.currentTime + delay + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 0.4);
      osc.start(ctx.currentTime + delay);
      osc.stop(ctx.currentTime + delay + 0.4);
    });
  } catch(e) {}
}
</script>

<script>
var PASS = 'valet2024';

function doLogin() {
  var val = document.getElementById('passInput').value;
  if (val === PASS) {
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('mainPage').style.display = 'flex';
    sessionStorage.setItem('valetAuth', '1');
  } else {
    document.getElementById('loginErr').style.display = 'block';
    document.getElementById('passInput').value = '';
  }
}

function doLogout() {
  sessionStorage.removeItem('valetAuth');
  document.getElementById('loginOverlay').style.display = 'flex';
  document.getElementById('mainPage').style.display = 'none';
  document.getElementById('passInput').value = '';
}

// Auto-login if session active
if (sessionStorage.getItem('valetAuth') === '1') {
  document.getElementById('loginOverlay').style.display = 'none';
  document.getElementById('mainPage').style.display = 'flex';
}

document.getElementById('passInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});
</script>
